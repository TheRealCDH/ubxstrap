---
- name: Create headscale user and group
  group:
    name: "{{ headscale_group }}"
    system: true
    state: present

- name: Create headscale user
  user:
    name: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    home: "{{ headscale_home }}"
    create_home: yes
    system: true
    state: present

- name: Create headscale directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: '0750'
  loop:
    - "{{ headscale_config_dir }}"
    - "{{ headscale_home }}"

- name: Detect architecture
  set_fact:
    arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else 'unknown' }}"

- name: Fail if unknown architecture
  fail:
    msg: "Unsupported architecture: {{ ansible_architecture }}"
  when: arch == 'unknown'

- name: Ensure python3-apt is installed
  apt:
    name: python3-apt
    state: present

- name: Download headscale deb package
  get_url:
    url: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}/headscale_{{ headscale_version }}_linux_{{ arch }}.deb"
    dest: "/tmp/headscale.deb"
    mode: '0644'
    force: yes

- name: Install headscale deb package
  apt:
    deb: "/tmp/headscale.deb"
    state: present

- name: Template headscale config
  template:
    src: "headscale.yaml.j2"
    dest: "{{ headscale_config_dir }}/config.yaml"
    owner: "{{ headscale_user }}"
    group: "{{ headscale_group }}"
    mode: '0644'
  notify: restart headscale

- name: Ensure headscale is enabled and started
  systemd:
    name: headscale
    enabled: yes
    state: started
